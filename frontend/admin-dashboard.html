<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SmartHire</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">SmartHire</a>
        <div class="nav-links" id="auth-links"></div>
    </nav>

    <div class="container dashboard-grid">
        <aside class="sidebar">
            <ul class="sidebar-nav">
                <li><a href="#" class="active" onclick="showSection('users-section', this); loadUsers()">Manage Users</a></li>
                <li><a href="#" onclick="showSection('jobs-section', this); loadJobs()">Manage Jobs</a></li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <div id="msg" class="hidden"></div>

            <!-- Manage Users Section -->
            <section id="users-section">
                <h2>All Users</h2>
                <div class="table-container" style="margin-top: 1.5rem;">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Roles</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Manage Jobs Section -->
            <section id="jobs-section" class="hidden">
                <h2>All Jobs</h2>
                <div class="table-container" style="margin-top: 1.5rem;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Company</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="jobs-table-body">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        if(!isAuthenticated() || !hasRole('ROLE_ADMIN')) {
            window.location.href = 'login.html';
        }

        function showSection(id, navElement) {
            document.querySelectorAll('.dashboard-content section').forEach(sec => sec.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            
            document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
            navElement.classList.add('active');
        }

        async function loadUsers() {
            try {
                const response = await apiCall('/admin/users');
                const users = response.data;
                const tbody = document.getElementById('users-table-body');
                
                tbody.innerHTML = users.map(user => `
                    <tr>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.roles.join(', ')}</td>
                        <td>
                            <button onclick="deleteUser(${user.id})" class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                showMessage('msg', error.message, true);
            }
        }

        async function deleteUser(id) {
            if(!confirm('Are you sure you want to delete this user? This action is irreversible.')) return;
            try {
                await apiCall(`/admin/users/${id}`, 'DELETE');
                showMessage('msg', 'User deleted successfully.');
                loadUsers();
            } catch (error) {
                showMessage('msg', error.message, true);
            }
        }

        async function loadJobs() {
            try {
                // Fetch paginated jobs (just grab first 50 for admin view)
                const response = await apiCall('/jobs?pageSize=50');
                const jobs = response.data.content;
                const tbody = document.getElementById('jobs-table-body');
                
                tbody.innerHTML = jobs.map(job => `
                    <tr>
                        <td>${job.id}</td>
                        <td>${job.title}</td>
                        <td>${job.company.name}</td>
                        <td>
                            <button onclick="deleteJobAdmin(${job.id})" class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                showMessage('msg', error.message, true);
            }
        }

        async function deleteJobAdmin(id) {
            if(!confirm('Are you sure you want to delete this job?')) return;
            try {
                await apiCall(`/admin/jobs/${id}`, 'DELETE');
                showMessage('msg', 'Job deleted successfully.');
                loadJobs();
            } catch (error) {
                showMessage('msg', error.message, true);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadUsers();
        });
    </script>
</body>
</html>
