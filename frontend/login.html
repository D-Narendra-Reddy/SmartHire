<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartHire</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">SmartHire</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="register.html" class="btn btn-outline">Sign Up</a>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 1.5rem;">Welcome Back</h2>
            <div id="login-msg" class="hidden"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem;">
                Don't have an account? <a href="register.html">Sign up</a>
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await apiCall('/auth/login', 'POST', { email, password });
                
                // Save token and user info
                setToken(response.data.accessToken);
                setUser(response.data.user);

                // Redirect based on role
                const roles = response.data.user.roles;
                if (roles.includes('ROLE_ADMIN')) {
                    window.location.href = 'admin-dashboard.html';
                } else if (roles.includes('ROLE_RECRUITER')) {
                    window.location.href = 'recruiter-dashboard.html';
                } else {
                    window.location.href = 'candidate-dashboard.html';
                }
            } catch (error) {
                showMessage('login-msg', error.message, true);
            }
        });
    </script>
</body>
</html>
