# Server — Railway injects PORT automatically
server.port=${PORT:8080}

# Database — set these as env vars in Railway
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=86400000

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dkivosfsj}
cloudinary.api-key=${CLOUDINARY_API_KEY:445914887169941}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:x7xa21iVnNwgfom4-Mx70JH6COQ}

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.smarthire=INFO
